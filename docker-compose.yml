services:
  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: trend-to-rule-app
    depends_on:
      - qdrant
    env_file:
      - ./src/.env
    environment:
      VECTOR_QDRANT_URL: http://qdrant:6333
      VECTOR_QDRANT_PATH: ""
    ports:
      - "8501:8501"
    volumes:
      - ./.data:/app/.data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17-unprivileged
    container_name: trend-to-rule-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
